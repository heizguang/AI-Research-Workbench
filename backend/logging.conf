[loggers]
keys=root,uvicorn

[handlers]
keys=console

[formatters]
keys=detailed

[logger_root]
level=INFO
handlers=console

[logger_uvicorn]
level=INFO
handlers=console
qualname=uvicorn

[handler_console]
class=StreamHandler
formatter=detailed
args=(sys.stdout,)

[formatter_detailed]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
